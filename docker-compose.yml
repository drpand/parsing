# Docker Compose для IndiaShop Bot v1.2.0
# © 2026 IndiaShop. All Rights Reserved.

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indiashop_bot_v1.2
    restart: unless-stopped

    # Переменные окружения из .env
    env_file:
      - .env

    # Том для данных (БД, кэш, логи)
    volumes:
      - ./data:/app/data
      - ./bot.db:/app/bot.db
      - ./bot_cache.db:/app/bot_cache.db
      - ./logs:/app/logs

    # Shared memory для Chrome (важно для Selenium!)
    shm_size: 2gb

    # Ограничение ресурсов
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Сеть
    networks:
      - indiashop_network

    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Логи
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

# Сети
networks:
  indiashop_network:
    driver: bridge
    name: indiashop_network_v1.2
